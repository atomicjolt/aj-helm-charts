elasticsearchWhitelistLabels: {}
scheduledScaling:
  # all times are UTC
  enabled: false
  image:
    repository: rancher/kubectl
    tag: v1.30.14
  cronjobs: []
    # - name: scale-up
    #   schedule: "0 11 * * 1-5"
    #   replicas: 2
    # - name: scale-down
    #   schedule: "0 23 * * 1-5"
    #   replicas: 1

service_monitor:
  enabled: true

cronjobs:
  enabled: false
  jobs:
  - name: error-summary
    schedule: "0 0 * * *"
    command: "Catalyst.ReleaseTasks.send_daily_summary()"

serviceAccount:
  create: false
  name: ""
  annotations: {}

persistence:
  size: 10Gi

ajAppMonitoring:
  enabled: false

appPdb:
  enabled: true
  minAvailable: "0"

redis:
  enabled: false
  #image.registry: public.ecr.aws/docker/library
  
  # Additional configuration (e.g. password)
  extraSecretRedisConfigs: redis-config

  useDeploymentWhenNonHA: true

  metrics:
    enabled: true
    exporter:
      extraExporterEnvSecrets:
        - redis-exporter

  serviceMonitor:
    enabled: true

  resources:
    requests:
      memory: 100Mi
    limits:
      memory: 200Mi

  redisConfig: |-
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
    maxmemory-policy allkeys-lru
    save ""

externalSecrets:
  redis:
    enabled: false
    data: []
    # data:
    # - secretKey: redis.conf
    #   remoteRef:
    #     key: /path/redis.conf
    secretStoreRef: {}
    # secretStoreRef:
    #   name: aws-ssm
    #   kind: ClusterSecretStore
    refreshInterval: 2m
    dataFrom: []
    target: 
      creationPolicy: Orphan
      deletionPolicy: Retain
  config:
    enabled: false
    data: []
    # data:
    # - secretKey: redis.conf
    #   remoteRef:
    #     key: /path/redis.conf
    secretStoreRef: {}
    # secretStoreRef:
    #   name: aws-ssm
    #   kind: ClusterSecretStore
    refreshInterval: 2m
    dataFrom: []
    target: 
      creationPolicy: Orphan
      deletionPolicy: Retain

dnsSidecar:
  enabled: false
  # Requires Kubernetes 1.29+ for native sidecar support (init container with restartPolicy: Always).
  # The sidecar starts before all init containers, providing DNS caching for every container in the pod.
  image: ghcr.io/klutchell/unbound:latest
  resources: {}
  # ClusterIP of the kube-dns service in your cluster.
  # Retrieve with: kubectl get svc kube-dns -n kube-system -o jsonpath='{.spec.clusterIP}'
  clusterDnsIP: "10.96.0.10"
  # Upstream forwarders for the catch-all zone (".").
  forwarders:
  - "1.1.1.2"
  - "1.0.0.2"
  # RRset cache holds individual resource records; msg cache holds full responses.
  # rrset-cache-size should generally be 2x msg-cache-size.
  msgCacheSize: "16m"
  rrsetCacheSize: "32m"
  metrics:
    enabled: false
    image: cyb3rjak3/unbound-exporter:0.5.0
    port: 9167
    controlSocket: /run/unbound/unbound.ctl
    resources: {}
  # Full unbound.conf content. Supports Helm template expressions (evaluated via tpl).
  unboundConf: |
    server:
      interface: 127.0.0.1
      port: 53
      do-daemonize: no
      access-control: 127.0.0.1 allow
      msg-cache-size: {{ .Values.dnsSidecar.msgCacheSize }}
      rrset-cache-size: {{ .Values.dnsSidecar.rrsetCacheSize }}
      # Allow resolving K8s internal names by forwarding to CoreDNS
      local-zone: "cluster.local." transparent
    {{- if .Values.dnsSidecar.metrics.enabled }}
    remote-control:
      control-enable: yes
      control-interface: {{ .Values.dnsSidecar.metrics.controlSocket }}
      control-use-cert: no
    {{- end }}

    # FORWARDING RULES
    forward-zone:
      name: "cluster.local."
      forward-addr: {{ .Values.dnsSidecar.clusterDnsIP }}

    forward-zone:
      name: "."
      {{- range .Values.dnsSidecar.forwarders }}
      forward-addr: {{ . }}
      {{- end }}

