apiVersion: v1
kind: ConfigMap
metadata:
  name: catalyst-app-config
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "argocd.argoproj.io/sync-wave": "-10"
data:
  specific.toml: |
    [phoenix]
    serve_endpoints = true

    [catalyst]
    run_scheduler = false
